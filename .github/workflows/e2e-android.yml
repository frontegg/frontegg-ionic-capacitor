name: E2E Android (example)

# Modeled on frontegg/frontegg-android-kotlin/.github/workflows/demo-e2e.yml
# and its reusable embedded-e2e-reusable.yml. The reference uses a sharded
# matrix driven by scenario-catalog generation scripts; this is a simpler
# single-job variant suitable for the Ionic example's P0 suite.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  android-e2e:
    name: Android E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('example/android/**/*.gradle*', 'example/android/**/gradle-wrapper.properties') }}

      - name: Install example dependencies
        working-directory: example
        run: npm install --no-audit --no-fund

      - name: Build Ionic web assets
        working-directory: example
        run: npm run build

      - name: Capacitor sync (android)
        working-directory: example
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        working-directory: example/android
        run: chmod +x gradlew

      - name: Build debug + androidTest
        working-directory: example/android
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest --no-daemon

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumentation tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          LOGIN_WRONG_EMAIL: ${{ secrets.LOGIN_WRONG_EMAIL }}
          LOGIN_WRONG_PASSWORD: ${{ secrets.LOGIN_WRONG_PASSWORD }}
          GOOGLE_EMAIL: ${{ secrets.GOOGLE_EMAIL }}
          GOOGLE_PASSWORD: ${{ secrets.GOOGLE_PASSWORD }}
          FRONTEGG_E2E_BASE_URL: ${{ secrets.FRONTEGG_E2E_BASE_URL }}
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          profile: pixel_6
          cores: 4
          ram-size: 4096M
          heap-size: 1024M
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: example/android
          script: |
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            ./gradlew :app:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.LOGIN_EMAIL="$LOGIN_EMAIL" -Pandroid.testInstrumentationRunnerArguments.LOGIN_PASSWORD="$LOGIN_PASSWORD" -Pandroid.testInstrumentationRunnerArguments.LOGIN_WRONG_EMAIL="${LOGIN_WRONG_EMAIL:-wrong@example.com}" -Pandroid.testInstrumentationRunnerArguments.LOGIN_WRONG_PASSWORD="${LOGIN_WRONG_PASSWORD:-wrong}" -Pandroid.testInstrumentationRunnerArguments.GOOGLE_EMAIL="${GOOGLE_EMAIL:-}" -Pandroid.testInstrumentationRunnerArguments.GOOGLE_PASSWORD="${GOOGLE_PASSWORD:-}" -Pandroid.testInstrumentationRunnerArguments.FRONTEGG_E2E_BASE_URL="${FRONTEGG_E2E_BASE_URL:-}"

      - name: Collect JUnit reports
        if: always()
        run: |
          mkdir -p e2e-artifacts
          find example/android -path "*/build/outputs/androidTest-results/*" -name "*.xml" \
            -exec cp -f {} e2e-artifacts/ \; 2>/dev/null || true

      - name: Publish JUnit report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: e2e-artifacts/*.xml
          check_name: E2E Android

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-e2e-results
          path: |
            e2e-artifacts/
            example/android/app/build/reports/androidTests/
          if-no-files-found: ignore
